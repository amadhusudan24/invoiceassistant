server.port=8080

spring.datasource.url=jdbc:h2:mem:invoicedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
app.jwt.secret=9a7c3e5d8f1b2a4c6e8d0f1b2a3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c
app.jwt.expiration=86400000

# File Upload Directory
upload.dir=uploads

# Spring AI Gemini Configuration
spring.ai.vertex.ai.gemini.project-id=${GEMINI_PROJECT_ID:demo}
spring.ai.vertex.ai.gemini.location=${GEMINI_LOCATION:us-central1}
